<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VGA Mode 13h — WASM Harness</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #ccc; font-family: monospace; display: flex; flex-direction: column; align-items: center; height: 100vh; }
h1 { font-size: 14px; margin: 12px 0 8px; color: #888; }
#picker { margin-bottom: 10px; }
#picker select { background: #222; color: #eee; border: 1px solid #555; padding: 4px 8px; font-family: monospace; font-size: 13px; }
#picker button { background: #333; color: #eee; border: 1px solid #555; padding: 4px 12px; font-family: monospace; cursor: pointer; margin-left: 4px; }
#picker button:hover { background: #555; }
canvas { image-rendering: pixelated; image-rendering: crisp-edges; border: 2px solid #333; }
#info { font-size: 11px; color: #666; margin-top: 6px; }
</style>
</head>
<body>
<h1>VGA Mode 13h — WASM Harness</h1>
<div id="picker">
  <select id="demo">
    <option value="gradient">gradient — palette bars</option>
    <option value="plasma">plasma — classic effect</option>
    <option value="fire" selected>fire — doom fire</option>
    <option value="starfield">starfield — 3D stars</option>
  </select>
  <button onclick="loadDemo()">Load</button>
</div>
<canvas id="screen" width="320" height="200"></canvas>
<div id="info">fps: --</div>
<script src="https://cdn.jsdelivr.net/npm/wabt@1.0.36/index.js"></script>
<script src="harness.js"></script>
</body>
</html>
